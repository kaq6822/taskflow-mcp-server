# TaskFlow argv allowlist.
#
# Each entry is a list representing a matching prefix. Examples:
#   - ["echo"]                       — any echo invocation
#   - ["sleep"]                      — any sleep invocation
#   - ["/bin/ls", "-la"]             — only this exact prefix
#
# To add commands for your own environment, append new entries and reload the
# backend. Adding commands is your explicit opt-in to give TaskFlow worker the
# ability to execute them.
allow:
  - ["echo"]
  - ["printf"]
  - ["sleep"]
  - ["ls"]
  - ["cat"]
  - ["/bin/true"]
  - ["/bin/false"]
  - ["/bin/echo"]
  - ["/bin/sleep"]
  - ["/bin/ls"]
  - ["/bin/cat"]
  - ["/usr/bin/echo"]
  - ["/usr/bin/printf"]
  - ["/usr/bin/sleep"]
  - ["/usr/bin/ls"]
  - ["/usr/bin/cat"]
